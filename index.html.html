<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>24H del Bellarosa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0A0C0F;
  --bg-panel:#14171C;
  --bg-panel-2:#1B1F26;
  --line:#262B33;
  --line-soft:#1E222A;
  --text:#F2F4F0;
  --text-muted:#8A9099;
  --text-dim:#5B6068;
  --amber:#FFB627;
  --amber-dim:#8A6A22;
  --cyan:#38E1FF;
  --red:#FF4757;
  --green:#3ECF8E;
  --radius:14px;
  --radius-sm:8px;
  --display: 'Anton', Impact, sans-serif;
  --body: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*{box-sizing:border-box; margin:0; padding:0;}
html,body{background:var(--bg); color:var(--text); font-family:var(--body); min-height:100%;}
body{
  background:
    radial-gradient(ellipse 900px 500px at 15% -10%, rgba(255,182,39,0.07), transparent 60%),
    radial-gradient(ellipse 700px 500px at 100% 0%, rgba(56,225,255,0.06), transparent 55%),
    var(--bg);
  padding-bottom:60px;
}
a{color:inherit; text-decoration:none;}
button{font-family:inherit; cursor:pointer;}
::selection{background:var(--amber); color:#0A0C0F;}
::-webkit-scrollbar{height:8px; width:8px;}
::-webkit-scrollbar-thumb{background:var(--line); border-radius:8px;}

/* ---------- HEADER ---------- */
header.top{
  position:sticky; top:0; z-index:50;
  background:rgba(10,12,15,0.92); backdrop-filter:blur(10px);
  border-bottom:1px solid var(--line);
}
.brandbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 20px 10px;
  max-width:1180px; margin:0 auto;
}
.brand{display:flex; align-items:center; gap:12px;}
.brand .num{
  font-family:var(--display); font-size:30px; letter-spacing:1px; color:var(--amber);
  line-height:1;
}
.brand .name{font-family:var(--display); font-size:19px; letter-spacing:0.5px; line-height:1.05;}
.brand .name small{display:block; font-family:var(--mono); font-size:10px; color:var(--text-muted); letter-spacing:2px; font-weight:600; margin-top:2px;}
.clock-badge{
  font-family:var(--mono); font-size:12px; color:var(--text-muted);
  border:1px solid var(--line); border-radius:20px; padding:6px 12px;
  display:flex; align-items:center; gap:7px;
}
.clock-badge .dot{width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green);}

/* live ticker */
.ticker{
  border-top:1px solid var(--line-soft);
  padding:10px 20px; max-width:1180px; margin:0 auto;
  display:flex; align-items:center; gap:14px; overflow-x:auto;
}
.ticker .live-pill{
  display:flex; align-items:center; gap:6px; flex-shrink:0;
  background:rgba(255,71,87,0.12); border:1px solid rgba(255,71,87,0.35);
  color:var(--red); font-family:var(--mono); font-weight:700; font-size:11px;
  padding:4px 10px; border-radius:20px; letter-spacing:1px;
}
.ticker .live-pill .dot{width:6px; height:6px; border-radius:50%; background:var(--red); animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;} 50%{opacity:0.25;}}
.ticker .match-line{font-family:var(--mono); font-size:13px; white-space:nowrap; color:var(--text);}
.ticker .match-line b{color:var(--amber);}
.ticker .none{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

/* nav tabs */
nav.tabs{
  display:flex; gap:6px; overflow-x:auto; padding:10px 20px 12px;
  max-width:1180px; margin:0 auto; border-top:1px solid var(--line-soft);
}
nav.tabs .tab{
  flex-shrink:0; font-family:var(--display); font-size:13px; letter-spacing:0.6px;
  padding:9px 16px; border-radius:20px; color:var(--text-muted);
  border:1px solid transparent; transition:all .15s; cursor:pointer; user-select:none;
}
nav.tabs .tab:hover{color:var(--text); border-color:var(--line);}
nav.tabs .tab.active{background:var(--amber); color:#171003; border-color:var(--amber);}

/* ---------- MAIN ---------- */
main{max-width:1180px; margin:0 auto; padding:24px 20px 40px;}
.section-title{
  font-family:var(--display); font-size:26px; letter-spacing:0.5px; margin-bottom:4px;
}
.section-sub{font-family:var(--mono); font-size:12px; color:var(--text-muted); margin-bottom:20px; letter-spacing:0.5px;}

/* ---------- HERO LIVE SCOREBOARD ---------- */
.hero-live{
  background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
  border:1px solid var(--line); border-radius:20px; padding:26px 22px;
  margin-bottom:26px; position:relative; overflow:hidden;
}
.hero-live::before{
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(115deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 26px);
  pointer-events:none;
}
.hero-live .tag{
  font-family:var(--mono); font-size:11px; letter-spacing:2px; color:var(--red); font-weight:700;
  display:flex; align-items:center; gap:7px; margin-bottom:16px;
}
.hero-live .tag .dot{width:7px; height:7px; border-radius:50%; background:var(--red); animation:pulse 1.2s infinite;}
.score-row{display:flex; align-items:center; justify-content:center; gap:18px; flex-wrap:wrap;}
.score-team{flex:1; min-width:120px; text-align:center;}
.score-team .badge{
  width:52px; height:52px; border-radius:50%; margin:0 auto 8px; display:flex; align-items:center; justify-content:center;
  font-family:var(--display); font-size:18px; border:2px solid var(--line);
}
.score-team .tname{font-family:var(--display); font-size:16px; letter-spacing:0.3px; line-height:1.15;}
.score-team .scorers{margin-top:10px; font-family:var(--mono); font-size:11px; color:var(--text-muted); line-height:1.7;}
.score-mid{display:flex; flex-direction:column; align-items:center; gap:6px; padding:0 6px;}
.score-digits{
  font-family:var(--mono); font-weight:800; font-size:48px; letter-spacing:2px;
  background:#0A0C0F; border:1px solid var(--line); border-radius:12px; padding:6px 18px;
  display:flex; align-items:center; gap:10px;
}
.score-digits .sep{color:var(--text-dim); font-size:30px;}
.timer-chip{
  font-family:var(--mono); font-size:13px; color:var(--cyan); border:1px solid rgba(56,225,255,0.35);
  background:rgba(56,225,255,0.08); padding:4px 12px; border-radius:20px; letter-spacing:1px;
}
.hero-live .empty{text-align:center; padding:22px 10px;}
.hero-live .empty .big{font-family:var(--display); font-size:20px; color:var(--text-muted); margin-bottom:6px;}
.hero-live .empty .small{font-family:var(--mono); font-size:12px; color:var(--text-dim);}

/* next matches strip */
.next-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(230px,1fr)); gap:12px; margin-bottom:10px;}
.next-card{
  background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius);
  padding:14px 16px;
}
.next-card .meta{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:1px; margin-bottom:8px; display:flex; justify-content:space-between;}
.next-card .teams{font-family:var(--body); font-weight:700; font-size:14.5px; display:flex; align-items:center; justify-content:space-between; gap:8px;}
.next-card .teams .vs{color:var(--text-dim); font-weight:500; font-size:11px;}
.next-card .score{font-family:var(--mono); font-weight:800; color:var(--amber); font-size:15px;}
.status-chip{font-family:var(--mono); font-size:9.5px; letter-spacing:1px; padding:2px 8px; border-radius:20px; font-weight:700;}
.status-chip.scheduled{background:rgba(138,144,153,0.12); color:var(--text-muted);}
.status-chip.live{background:rgba(255,71,87,0.15); color:var(--red);}
.status-chip.finished{background:rgba(62,207,142,0.12); color:var(--green);}

/* ---------- CALENDARIO ---------- */
.day-block{margin-bottom:22px;}
.day-label{
  font-family:var(--display); font-size:15px; letter-spacing:1px; color:var(--amber);
  margin:18px 0 10px; padding-bottom:6px; border-bottom:1px solid var(--line-soft);
}
.match-list{display:flex; flex-direction:column; gap:8px;}
.match-row{
  display:grid; grid-template-columns:56px 1fr auto 1fr; align-items:center; gap:10px;
  background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; padding:11px 14px;
}
.match-row .time{font-family:var(--mono); font-size:12.5px; color:var(--text-muted);}
.match-row .teamA{text-align:right; font-weight:600; font-size:13.5px; display:flex; align-items:center; justify-content:flex-end; gap:8px;}
.match-row .teamB{text-align:left; font-weight:600; font-size:13.5px; display:flex; align-items:center; justify-content:flex-start; gap:8px;}
.match-row .mid{display:flex; flex-direction:column; align-items:center; gap:3px; min-width:70px;}
.match-row .mid .sc{font-family:var(--mono); font-weight:800; color:var(--amber); font-size:16px;}
.match-row .mid .vs{font-family:var(--mono); font-size:11px; color:var(--text-dim);}
.phase-badge{
  display:inline-block; font-family:var(--mono); font-size:9.5px; letter-spacing:1px; color:var(--cyan);
  border:1px solid rgba(56,225,255,0.3); padding:2px 8px; border-radius:20px; margin-left:6px;
}

/* ---------- CLASSIFICA ---------- */
.groups-wrap{display:grid; grid-template-columns:1fr 1fr; gap:20px;}
@media (max-width:760px){.groups-wrap{grid-template-columns:1fr;}}
.group-card{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
.group-card h3{font-family:var(--display); font-size:16px; letter-spacing:0.5px; padding:14px 16px; border-bottom:1px solid var(--line-soft); color:var(--amber);}
table.standings{width:100%; border-collapse:collapse; font-size:12.5px;}
table.standings th{
  font-family:var(--mono); font-size:10px; color:var(--text-dim); text-align:center; padding:8px 4px; letter-spacing:0.5px; border-bottom:1px solid var(--line-soft);
}
table.standings th:first-child, table.standings td:first-child{text-align:left; padding-left:14px;}
table.standings td{padding:9px 4px; text-align:center; border-bottom:1px solid var(--line-soft); font-family:var(--mono);}
table.standings td.tname{font-family:var(--body); font-weight:600; font-size:13px; text-align:left;}
table.standings td.pts{color:var(--amber); font-weight:800;}
table.standings tr.qualify td.tname{border-left:3px solid var(--amber); padding-left:11px;}
table.standings tr:last-child td{border-bottom:none;}
.legend{display:flex; align-items:center; gap:6px; padding:10px 16px; font-family:var(--mono); font-size:10.5px; color:var(--text-dim);}
.legend .sw{width:10px; height:10px; border-radius:2px; background:var(--amber);}

/* ---------- MARCATORI ---------- */
.scorers-table{width:100%; border-collapse:collapse; background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
.scorers-table th{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); text-align:left; padding:10px 14px; border-bottom:1px solid var(--line-soft);}
.scorers-table td{padding:11px 14px; border-bottom:1px solid var(--line-soft); font-size:13.5px;}
.scorers-table tr:last-child td{border-bottom:none;}
.scorers-table .rank{font-family:var(--mono); color:var(--text-dim); width:34px;}
.scorers-table .goals{font-family:var(--mono); font-weight:800; color:var(--amber); text-align:right;}
.scorers-table tr:nth-child(1) .rank{color:var(--amber);}

/* ---------- ROSE ---------- */
.teams-grid{display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px;}
.team-card{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
.team-card .head{padding:16px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--line-soft);}
.team-card .dot{width:14px; height:14px; border-radius:4px; flex-shrink:0;}
.team-card h4{font-family:var(--display); font-size:16px; letter-spacing:0.3px;}
.team-card .grp{font-family:var(--mono); font-size:10px; color:var(--text-dim); letter-spacing:1px; margin-top:2px;}
.team-card ol{list-style:none; padding:10px 16px 14px;}
.team-card li{
  display:flex; gap:10px; align-items:center; padding:5px 0; font-size:13px; font-weight:500;
}
.team-card li .n{font-family:var(--mono); color:var(--text-dim); font-size:11px; width:16px;}

/* ---------- PROIETTORE ---------- */
body.projector-mode{background:#000; padding:0;}
.projector{
  min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:40px 20px; text-align:center; gap:30px;
}
.projector .pj-tag{font-family:var(--mono); letter-spacing:6px; color:var(--red); font-size:16px; display:flex; align-items:center; gap:12px;}
.projector .pj-tag .dot{width:12px; height:12px; border-radius:50%; background:var(--red); animation:pulse 1.2s infinite;}
.projector .pj-row{display:flex; align-items:center; justify-content:center; gap:60px; width:100%; max-width:1100px; flex-wrap:wrap;}
.projector .pj-team{flex:1; min-width:260px;}
.projector .pj-team .pj-badge{width:110px; height:110px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-family:var(--display); font-size:38px; border:4px solid var(--line);}
.projector .pj-team .pj-name{font-family:var(--display); font-size:42px; letter-spacing:1px; line-height:1.1;}
.projector .pj-team .pj-scorers{margin-top:22px; font-family:var(--mono); font-size:17px; color:var(--text-muted); line-height:2;}
.projector .pj-mid{display:flex; flex-direction:column; align-items:center; gap:16px;}
.projector .pj-score{font-family:var(--mono); font-weight:800; font-size:130px; line-height:1; letter-spacing:6px; color:var(--text);}
.projector .pj-score .sep{color:var(--text-dim); margin:0 10px;}
.projector .pj-timer{font-family:var(--mono); font-size:30px; color:var(--cyan); border:2px solid rgba(56,225,255,0.4); background:rgba(56,225,255,0.08); padding:8px 26px; border-radius:40px; letter-spacing:3px;}
.projector .pj-phase{font-family:var(--mono); font-size:14px; color:var(--text-dim); letter-spacing:3px;}
.pj-exit{position:fixed; top:16px; right:16px; font-family:var(--mono); font-size:11px; color:var(--text-dim); border:1px solid var(--line); padding:6px 12px; border-radius:20px; z-index:99; cursor:pointer; user-select:none;}

/* ---------- ADMIN ---------- */
.admin-lock{max-width:340px; margin:60px auto; text-align:center;}
.admin-lock input{
  width:100%; background:var(--bg-panel); border:1px solid var(--line); border-radius:10px; color:var(--text);
  padding:14px; font-family:var(--mono); font-size:20px; text-align:center; letter-spacing:6px; margin:16px 0;
}
.btn{
  font-family:var(--display); font-size:13px; letter-spacing:0.5px; padding:11px 22px; border-radius:10px;
  border:1px solid var(--line); background:var(--bg-panel-2); color:var(--text);
}
.btn.primary{background:var(--amber); color:#171003; border-color:var(--amber);}
.btn.danger{background:rgba(255,71,87,0.12); color:var(--red); border-color:rgba(255,71,87,0.4);}
.btn.ghost{background:transparent;}
.btn:disabled{opacity:0.4; cursor:not-allowed;}
.btn:active{transform:scale(0.97);}

.admin-grid{display:grid; grid-template-columns:320px 1fr; gap:18px;}
@media (max-width:900px){.admin-grid{grid-template-columns:1fr;}}
.admin-list{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); max-height:78vh; overflow-y:auto;}
.admin-list .grp-h{font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:1.5px; padding:12px 14px 6px;}
.admin-list .m-item{
  padding:10px 14px; border-bottom:1px solid var(--line-soft); font-size:12.5px; cursor:pointer;
  display:flex; flex-direction:column; gap:3px;
}
.admin-list .m-item:hover{background:var(--bg-panel-2);}
.admin-list .m-item.sel{background:rgba(255,182,39,0.08); border-left:3px solid var(--amber);}
.admin-list .m-item .l1{display:flex; justify-content:space-between; font-family:var(--mono); color:var(--text-dim); font-size:10.5px;}
.admin-list .m-item .l2{font-weight:600;}

.admin-panel{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); padding:20px;}
.admin-panel .ap-title{font-family:var(--display); font-size:20px; margin-bottom:2px;}
.admin-panel .ap-sub{font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:18px;}
.ap-score-row{display:flex; align-items:center; justify-content:center; gap:24px; margin:18px 0;}
.ap-team-col{flex:1; text-align:center;}
.ap-team-col .tname{font-family:var(--display); font-size:16px; margin-bottom:10px;}
.ap-score-num{font-family:var(--mono); font-weight:800; font-size:40px; color:var(--amber);}
.ap-goal-btn{margin-top:10px; width:100%;}
.ap-controls{display:flex; gap:10px; flex-wrap:wrap; justify-content:center; margin:16px 0;}
.ap-goals-log{margin-top:16px; border-top:1px solid var(--line-soft); padding-top:14px;}
.ap-goals-log .gitem{display:flex; justify-content:space-between; font-family:var(--mono); font-size:12px; padding:5px 0; color:var(--text-muted);}
.ap-select{width:100%; background:var(--bg); border:1px solid var(--line); border-radius:8px; color:var(--text); padding:10px; font-family:var(--body); margin-bottom:10px;}
.modal-back{position:fixed; inset:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
.modal{background:var(--bg-panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px; max-width:360px; width:100%;}
.modal h4{font-family:var(--display); font-size:17px; margin-bottom:14px;}
.warn-box{background:rgba(255,182,39,0.08); border:1px solid rgba(255,182,39,0.3); color:var(--amber); font-family:var(--mono); font-size:11.5px; padding:10px 14px; border-radius:10px; margin-bottom:16px; line-height:1.6;}

.empty-state{text-align:center; padding:60px 20px; color:var(--text-dim); font-family:var(--mono); font-size:13px;}
</style>
</head>
<body>

<div id="app"></div>

<script>
/* ============================================================
   24H DEL BELLAROSA — dati torneo

/* ============================================================
   STATO (persistente, condiviso tra tutti gli utenti)
   ============================================================ */
function defaultMatchState(){ return {status:"scheduled", goals:[], timerRunning:false, timerStart:null, timerBase:0, winnerOverride:null}; }
function defaultState(){
  const st = {liveMatchId:null, matches:{}, bracketOverride:{}};
  MATCHES.forEach(m => st.matches[m.id] = defaultMatchState());
  return st;
}
let STATE = defaultState();
let adminUnlocked = false;
let lastLoadOk = false;

async function loadState(){
  try{
    const r = await window.storage.get("tournament_state", true);
    if(r && r.value){
      const parsed = JSON.parse(r.value);
      // merge: assicurati che tutte le partite abbiano uno stato
      MATCHES.forEach(m => { if(!parsed.matches[m.id]) parsed.matches[m.id] = defaultMatchState(); });
      STATE = parsed;
      lastLoadOk = true;
    }
  }catch(e){
    // chiave non esiste ancora -> crea stato di default
    try{ await window.storage.set("tournament_state", JSON.stringify(STATE), true); lastLoadOk = true; }
    catch(e2){ lastLoadOk = false; }
  }
}
async function saveState(){
  try{ await window.storage.set("tournament_state", JSON.stringify(STATE), true); }
  catch(e){ console.error("Errore salvataggio", e); alert("Errore di salvataggio, riprova."); }
}

/* ============================================================
   LOGICA TORNEO
   ============================================================ */
function matchDef(id){ return MATCHES.find(m => m.id === id); }
function runtime(id){ return STATE.matches[id] || defaultMatchState(); }
function score(id){
  const rt = runtime(id);
  return { a: rt.goals.filter(g=>g.team==="A").length, b: rt.goals.filter(g=>g.team==="B").length };
}
function computeStandings(group){
  const teams = Object.keys(TEAMS).filter(k => TEAMS[k].group === group);
  const table = {};
  teams.forEach(k => table[k] = {team:k, pl:0, w:0, d:0, l:0, gf:0, ga:0, pts:0});
  MATCHES.filter(m => m.phase==="girone" && m.group===group).forEach(m => {
    const rt = runtime(m.id);
    if(rt.status !== "finished") return;
    const s = score(m.id);
    const ta = table[m.A], tb = table[m.B];
    ta.pl++; tb.pl++; ta.gf+=s.a; ta.ga+=s.b; tb.gf+=s.b; tb.ga+=s.a;
    if(s.a > s.b){ ta.w++; ta.pts+=3; tb.l++; }
    else if(s.b > s.a){ tb.w++; tb.pts+=3; ta.l++; }
    else { ta.d++; tb.d++; ta.pts++; tb.pts++; }
  });
  return Object.values(table).sort((x,y) => (y.pts-x.pts) || ((y.gf-y.ga)-(x.gf-x.ga)) || (y.gf-x.gf) || TEAMS[x.team].name.localeCompare(TEAMS[y.team].name));
}
function resolveSlot(code){
  if(!code) return null;
  if(TEAMS[code]) return code;
  const m1 = code.match(/^([AB])([1-4])$/);
  if(m1){
    const st = computeStandings(m1[1]);
    const row = st[+m1[2]-1];
    return row ? row.team : null;
  }
  const m2 = code.match(/^(W|L)_(.+)$/);
  if(m2){
    const refId = m2[2], rt = runtime(refId), def = matchDef(refId);
    if(!def || rt.status !== "finished") return null;
    const s = score(refId);
    let winner = rt.winnerOverride || (s.a > s.b ? def.A : (s.b > s.a ? def.B : null));
    if(!winner) return null;
    winner = resolveSlot(winner);
    const teamAResolved = resolveSlot(def.A), teamBResolved = resolveSlot(def.B);
    const loser = winner === teamAResolved ? teamBResolved : teamAResolved;
    return m2[1] === "W" ? winner : loser;
  }
  return null;
}
function resolvedTeam(matchId, side){
  const def = matchDef(matchId);
  const override = STATE.bracketOverride[matchId];
  if(override && override[side]) return override[side];
  return resolveSlot(side === "A" ? def.A : def.B);
}
function teamLabel(matchId, side){
  const key = resolvedTeam(matchId, side);
  if(key && TEAMS[key]) return TEAMS[key].name;
  const def = matchDef(matchId);
  const code = side === "A" ? def.A : def.B;
  return SLOT_LABELS[code] || code;
}
function allScorers(){
  const map = {};
  MATCHES.forEach(m => {
    runtime(m.id).goals.forEach(g => {
      const teamKey = resolvedTeam(m.id, g.team) || (g.team==="A"?m.A:m.B);
      const tname = TEAMS[teamKey] ? TEAMS[teamKey].name : "?";
      const k = g.player + "|" + tname;
      if(!map[k]) map[k] = {player:g.player, team:tname, goals:0};
      map[k].goals++;
    });
  });
  return Object.values(map).sort((a,b)=>b.goals-a.goals);
}
function elapsedSeconds(rt){
  if(!rt.timerRunning) return rt.timerBase;
  return rt.timerBase + (Date.now() - rt.timerStart)/1000;
}
function fmtClock(sec){
  sec = Math.max(0, Math.floor(sec));
  const m = String(Math.floor(sec/60)).padStart(2,"0");
  const s = String(sec%60).padStart(2,"0");
  return m+":"+s;
}
function initials(name){ return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function logoImg(teamKey, color, size){
  if(!teamKey) return "";
  if(!LOGOS[teamKey]) return `<span style="color:${color||'#888'};">${initials(TEAMS[teamKey].name)}</span>`;
  const s = size || 52;
  return `<img src="${LOGOS[teamKey]}" alt="" style="width:${s}px; height:${s}px; object-fit:cover; border-radius:50%; display:inline-block; vertical-align:middle; flex-shrink:0;">`;
}

    <div class="ap-sub">${def.day} ${def.time} · ${PHASE_NAMES[def.phase]} · stato: ${rt.status.toUpperCase()}</div>

    ${!readyA || !readyB ? `<div class="warn-box">Una o entrambe le squadre non sono ancora definite (in attesa della fase precedente). Puoi comunque forzare le squadre qui sotto se necessario.</div>
    <select class="ap-select" id="overrideA"><option value="">-- forza squadra A --</option>${Object.keys(TEAMS).map(k=>`<option value="${k}" ${teamA===k?'selected':''}>${TEAMS[k].name}</option>`).join("")}</select>
    <select class="ap-select" id="overrideB"><option value="">-- forza squadra B --</option>${Object.keys(TEAMS).map(k=>`<option value="${k}" ${teamB===k?'selected':''}>${TEAMS[k].name}</option>`).join("")}</select>
    <button class="btn ghost" id="saveOverride" style="width:100%; margin-bottom:6px;">Salva squadre forzate</button>` : ""}

    <div class="ap-score-row">
      <div class="ap-team-col">
        <div class="tname">${teamLabel(id,'A')}</div>
        <div class="ap-score-num">${s.a}</div>
        ${readyA ? `<button class="btn primary ap-goal-btn" data-goal="A">+ Gol</button>` : ""}
      </div>
      <div class="ap-team-col">
        <div class="tname">${teamLabel(id,'B')}</div>
        <div class="ap-score-num">${s.b}</div>
        ${readyB ? `<button class="btn primary ap-goal-btn" data-goal="B">+ Gol</button>` : ""}
      </div>
    </div>

    <div style="text-align:center; font-family:var(--mono); font-size:26px; color:var(--cyan); margin:10px 0;">${fmtClock(elapsedSeconds(rt))}</div>

    <div class="ap-controls">
      ${rt.status==='scheduled' ? `<button class="btn primary" id="goLive" ${readyA&&readyB?'':'disabled'}>▶ Vai in diretta</button>` : ""}
      ${rt.status==='live' ? `<button class="btn" id="toggleTimer">${rt.timerRunning?'⏸ Pausa cronometro':'▶ Riprendi cronometro'}</button>` : ""}
      ${rt.status==='live' ? `<button class="btn ghost" id="resetTimer">⟲ Azzera tempo</button>` : ""}
      ${rt.status==='live' ? `<button class="btn danger" id="endMatch">■ Termina partita</button>` : ""}
      ${rt.status==='finished' ? `<button class="btn ghost" id="reopenMatch">↺ Riapri partita</button>` : ""}
      ${rt.goals.length ? `<button class="btn ghost" id="undoGoal">↩ Annulla ultimo gol</button>` : ""}
    </div>

    <div class="ap-goals-log">
      <div style="font-family:var(--mono); font-size:10.5px; color:var(--text-dim); letter-spacing:1px; margin-bottom:8px;">MARCATORI</div>
      ${rt.goals.length ? rt.goals.map(g=>`<div class="gitem"><span>${g.team===('A')?teamLabel(id,'A'):teamLabel(id,'B')} — ${g.player}</span><span>${g.min}'</span></div>`).join("") : `<div style="font-family:var(--mono); color:var(--text-dim); font-size:12px;">Nessun gol ancora</div>`}
    </div>
  </div>`;
}

function wireAdmin(){
  const pinBtn = document.getElementById("pinBtn");
  if(pinBtn){
    const tryPin = () => {
      const v = document.getElementById("pinInput").value;
      if(v === ADMIN_PIN){ adminUnlocked = true; render(); }
      else document.getElementById("pinErr").textContent = "PIN errato";
    };
    pinBtn.onclick = tryPin;
    document.getElementById("pinInput").addEventListener("keydown", e => { if(e.key==="Enter") tryPin(); });
    return;
  }
  document.querySelectorAll(".m-item").forEach(el => {
    el.onclick = () => { selectedMatchId = el.dataset.id; document.getElementById("main").innerHTML = renderAdmin(); wireAdmin(); };
  });
  if(!selectedMatchId) return;
  const id = selectedMatchId, rt = runtime(id), def = matchDef(id);

  const goLive = document.getElementById("goLive");
  if(goLive) goLive.onclick = async () => {
    Object.keys(STATE.matches).forEach(mid => { if(STATE.matches[mid].status==='live' && mid!==id){} });
    rt.status = "live"; rt.timerRunning = true; rt.timerStart = Date.now(); rt.timerBase = 0;
    STATE.liveMatchId = id;
    await saveState(); render();
  };
  const toggleTimer = document.getElementById("toggleTimer");
  if(toggleTimer) toggleTimer.onclick = async () => {
    if(rt.timerRunning){ rt.timerBase = elapsedSeconds(rt); rt.timerRunning = false; rt.timerStart = null; }
    else { rt.timerRunning = true; rt.timerStart = Date.now(); }
    await saveState(); render();
  };
  const resetTimer = document.getElementById("resetTimer");
  if(resetTimer) resetTimer.onclick = async () => {
    rt.timerBase = 0; rt.timerStart = rt.timerRunning ? Date.now() : null;
    await saveState(); render();
  };
  const endMatch = document.getElementById("endMatch");
  if(endMatch) endMatch.onclick = async () => {
    const s = score(id);
    if(s.a === s.b && def.phase !== "girone"){
      openWinnerModal(id);
      return;
    }
    rt.status = "finished"; rt.timerRunning = false;
    await saveState(); render();
  };
  const reopenMatch = document.getElementById("reopenMatch");
  if(reopenMatch) reopenMatch.onclick = async () => {
    rt.status = "live"; rt.winnerOverride = null;
    await saveState(); render();
  };
  const undoGoal = document.getElementById("undoGoal");
  if(undoGoal) undoGoal.onclick = async () => {
    rt.goals.pop();
    await saveState(); render();
  };
  document.querySelectorAll(".ap-goal-btn").forEach(btn => {
    btn.onclick = () => openGoalModal(id, btn.dataset.goal);
  });
  const saveOverride = document.getElementById("saveOverride");
  if(saveOverride) saveOverride.onclick = async () => {
    const a = document.getElementById("overrideA").value, b = document.getElementById("overrideB").value;
    STATE.bracketOverride[id] = STATE.bracketOverride[id] || {};
    if(a) STATE.bracketOverride[id].A = a;
    if(b) STATE.bracketOverride[id].B = b;
    await saveState(); render();
  };
}

function openGoalModal(matchId, side){
  const teamKey = resolvedTeam(matchId, side);
  if(!teamKey) return;
  const players = TEAMS[teamKey].players;
  const back = document.createElement("div");
  back.className = "modal-back";
  back.innerHTML = `<div class="modal">
    <h4>Gol per ${TEAMS[teamKey].name}</h4>
    <select class="ap-select" id="scorerSelect">${players.map(p=>`<option value="${p}">${p}</option>`).join("")}</select>
    <div style="display:flex; gap:10px;">
      <button class="btn ghost" id="cancelGoal" style="flex:1;">Annulla</button>
      <button class="btn primary" id="confirmGoal" style="flex:1;">Conferma gol</button>
    </div>
  </div>`;
  document.body.appendChild(back);
  document.getElementById("cancelGoal").onclick = () => back.remove();
  document.getElementById("confirmGoal").onclick = async () => {
    const player = document.getElementById("scorerSelect").value;
    const rt = runtime(matchId);
    const min = Math.floor(elapsedSeconds(rt)/60);
    rt.goals.push({team:side, player, min});
    back.remove();
    await saveState(); render();
  };
}

function openWinnerModal(matchId){
  const back = document.createElement("div");
  back.className = "modal-back";
  back.innerHTML = `<div class="modal">
    <h4>Pareggio — chi passa il turno?</h4>
    <div class="warn-box">Il punteggio è in parità. Seleziona la squadra vincitrice (es. dopo i rigori).</div>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <button class="btn primary" id="winA">${teamLabel(matchId,'A')}</button>
      <button class="btn primary" id="winB">${teamLabel(matchId,'B')}</button>
      <button class="btn ghost" id="cancelWin">Annulla</button>
    </div>
  </div>`;
  document.body.appendChild(back);
  document.getElementById("cancelWin").onclick = () => back.remove();
  const finish = async (side) => {
    const rt = runtime(matchId);
    rt.winnerOverride = resolvedTeam(matchId, side);
    rt.status = "finished"; rt.timerRunning = false;
    back.remove();
    await saveState(); render();
  };
  document.getElementById("winA").onclick = () => finish("A");
  document.getElementById("winB").onclick = () => finish("B");
}

/* ============================================================
   BOOT & LOOPS
   ============================================================ */
window.addEventListener("hashchange", render);

function tickClock(){
  const el = document.getElementById("liveclock");
  if(el) el.textContent = new Date().toLocaleTimeString("it-IT");
  const ht = document.getElementById("hometimer");
  if(ht && STATE.liveMatchId) ht.textContent = fmtClock(elapsedSeconds(runtime(STATE.liveMatchId)));
  const pt = document.getElementById("pjtimer");
  if(pt && STATE.liveMatchId) pt.textContent = fmtClock(elapsedSeconds(runtime(STATE.liveMatchId)));
}
setInterval(tickClock, 1000);

async function pollLoop(){
  await loadState();
  render();
}
setInterval(pollLoop, 4000);

(async function boot(){
  await loadState();
  render();
})();
</script>
</body>
</html>
